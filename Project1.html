<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration</title>
</head>
<body>
    <h2>Event Registration</h2>
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name" name="name">
        <br/>
        <br/>
        <label for="emailId">Email Id:</label>
        <input type="email" id="emailId" name="emailId">
        <br/>
        <br/>
        <label for="phoneNumber">Phone Number:</label>
        <input type="tel" id="phoneNumber" name="phoneNumber">
        <br/>
        <br/>
        <label for="occupationType">Occupation Type:</label>
        <select name="occupationType" id="occupationType">
            <option value="student">Student</option>
            <option value="professional">Professional</option>
            <option value="other">Other</option>
        </select>
        <br/>
        <br/>
        <fieldset>
            <legend>Topics of Interest</legend>
            <label for="checkbox1">HTML:</label>
        <input type="checkbox"id="checkbox1"name="checkbox1">

        <label for="checkbox2">CSS:</label>
        <input type="checkbox"id="checkbox2"name="checkbox2">

        <label for="checkbox3">JavaScript:</label>
        <input type="checkbox"id="checkbox3"name="checkbox3">
        </fieldset>
        <label for="textarea1">Comments:</label>
        <textarea name="textarea1" id="textarea1" cols="20" rows="10">enter text here</textarea>
        <input type="submit" value="Register">


    </form>
</body>
</html>
